<!DOCTYPE html>
<html>
<head>

<title>Admin - Claim Records</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background-color:#f4f6f9;
}

.card-box{
border-radius:10px;
padding:15px;
color:white;
font-weight:bold;
}

.total{background:#0d6efd;}
.fraud{background:#dc3545;}
.genuine{background:#198754;}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">

<div class="container-fluid">

<span class="navbar-brand">Admin Panel - Claim Records</span>

<div>

<a href="/admin" class="btn btn-primary me-2">Dashboard</a>

<a href="/logout" class="btn btn-danger">Logout</a>

</div>

</div>

</nav>

<!-- ANALYTICS SUMMARY -->
<div class="container mt-4">

<div class="row mb-4">

<div class="col-md-4">
<div class="card-box total">
Total Claims: {{total}}
</div>
</div>

<div class="col-md-4">
<div class="card-box fraud">
Fraud Claims: {{fraud}}
</div>
</div>

<div class="col-md-4">
<div class="card-box genuine">
Genuine Claims: {{genuine}}
</div>
</div>

</div>

<!-- SEARCH BOX -->
<div class="row mb-3">

<div class="col-md-4">
<input type="text" id="searchInput" class="form-control" placeholder="Search records...">
</div>

</div>

<!-- RECORD TABLE -->
<div class="card shadow">

<div class="card-header bg-dark text-white">
All Claim Records
</div>

<div class="card-body">

<div id="recordsTable">

{{table|safe}}

</div>

</div>

</div>

</div>

<!-- SEARCH SCRIPT -->
<script>

document.getElementById("searchInput").addEventListener("keyup", function() {

let value = this.value.toLowerCase();

let rows = document.querySelectorAll("#recordsTable table tbody tr");

rows.forEach(row => {

row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";

});

});

</script>

</body>
</html>
