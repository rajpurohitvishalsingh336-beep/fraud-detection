<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(to right, #eef2f3, #dfe9f3);
}

.card{
border:none;
border-radius:15px;
box-shadow:0px 4px 15px rgba(0,0,0,0.15);
transition:0.3s;
font-size:18px;
}

.card:hover{
transform:scale(1.05);
box-shadow:0px 8px 25px rgba(0,0,0,0.3);
}

.navbar{
box-shadow:0px 4px 10px rgba(0,0,0,0.3);
}

.stat-number{
font-size:28px;
font-weight:bold;
}

.chart-box{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0px 4px 15px rgba(0,0,0,0.15);
}

</style>

</head>

<body>


<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<span class="navbar-brand fs-4">
<i class="fa-solid fa-chart-line"></i> Admin Dashboard
</span>

<div>

<a href="/admin/records" class="btn btn-info me-2">
<i class="fa-solid fa-table"></i> Records
</a>

<a href="/logout" class="btn btn-danger">
<i class="fa-solid fa-right-from-bracket"></i> Logout
</a>

</div>

</div>

</nav>


<!-- MAIN CONTAINER -->

<div class="container mt-4">


<!-- STATISTICS CARDS -->

<div class="row g-4">


<div class="col-md-3">

<div class="card bg-danger text-white text-center p-3">

<i class="fa-solid fa-user-xmark fa-2x"></i>

<div class="mt-2">Fraud Claims</div>

<div class="stat-number">{{fraud}}</div>

</div>

</div>


<div class="col-md-3">

<div class="card bg-success text-white text-center p-3">

<i class="fa-solid fa-user-check fa-2x"></i>

<div class="mt-2">Genuine Claims</div>

<div class="stat-number">{{genuine}}</div>

</div>

</div>


<div class="col-md-3">

<div class="card bg-primary text-white text-center p-3">

<i class="fa-solid fa-database fa-2x"></i>

<div class="mt-2">Total Claims</div>

<div class="stat-number">{{total}}</div>

</div>

</div>


<div class="col-md-3">

<div class="card bg-warning text-white text-center p-3">

<i class="fa-solid fa-bullseye fa-2x"></i>

<div class="mt-2">Model Accuracy</div>

<div class="stat-number">{{accuracy}}%</div>

</div>

</div>


</div>


<!-- CHARTS -->

<div class="row mt-4 g-4">


<div class="col-md-6">

<div class="chart-box">

<h5 class="text-center mb-3">
<i class="fa-solid fa-chart-column"></i> Fraud vs Genuine
</h5>

<img src="/static/bar.png" class="img-fluid">

</div>

</div>


<div class="col-md-6">

<div class="chart-box">

<h5 class="text-center mb-3">
<i class="fa-solid fa-chart-pie"></i> Distribution
</h5>

<img src="/static/pie.png" class="img-fluid">

</div>

</div>


</div>


</div>


</body>
</html>
